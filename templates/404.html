{% extends 'base.html' %}

{% block content %}
<div class="container my-5 py-5">
    <div class="error-container bg-white border rounded-4 p-5 shadow-sm text-center">
        <div class="error-code mb-2">404</div>
        <h3 class="fw-bold text-primary mb-3">Page Not Found</h3>
        <p class="text-muted small mb-4">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <a href="{{ url_for('home') }}" class="btn btn-primary-custom">
            <i class="fa-solid fa-house me-1"></i> Return to Homepage
        </a>
    </div>
</div>
{% endblock %}
